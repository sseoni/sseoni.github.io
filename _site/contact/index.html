<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1066785994500439"
     crossorigin="anonymous"></script>
</head>

<body>
    
    <header class="header">
    <div class="container header-content">
        
        <a href="/" class="logo" aria-label="홈으로 이동">
            👩🏻‍💻 🐶 ✨ 🥐
        </a>

        <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기" aria-controls="navMenu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <nav aria-label="글로벌 내비게이션">
            <ul class="nav-list" id="navMenu">
                <li>
                    <a href="/" 
                       class="btn btn-small btn-transparent ">
                       Home
                    </a>
                </li>
    

                <li>
                    <a href="/blog/" 
                       class="btn btn-small btn-transparent ">
                       Blog
                    </a>
                </li>

                <li>
                    <a href="/portfolio/" 
                       class="btn btn-small btn-transparent ">
                       Portfolio
                    </a>
                </li>

                <li>
                    <a href="/contact/" 
                       class="btn btn-small btn-transparent active">
                       Contact
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</header>

<script>
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');

    navToggle.addEventListener('click', () => {
        // 1. 메뉴 보이기/숨기기
        navMenu.classList.toggle('active');
        navToggle.classList.toggle('open');
        
        // 2. 웹 접근성 업데이트
        const isOpened = navToggle.classList.contains('open');
        navToggle.setAttribute('aria-expanded', isOpened);
        navToggle.setAttribute('aria-label', isOpened ? '메뉴 닫기' : '메뉴 열기');
    });
</script>

    <div id="layout-wrapper">
        
    </div>

</body>
</html>
